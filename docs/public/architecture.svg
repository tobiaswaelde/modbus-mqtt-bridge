<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <style>
      .label{font:600 20px 'Inter', Arial, sans-serif; fill:#0f172a}
      .small{font:500 16px 'Inter', Arial, sans-serif; fill:#334155}
      .white{font:600 18px 'Inter', Arial, sans-serif; fill:#ffffff}
      .node{fill:#ffffff; stroke:#CBD5E1; stroke-width:2}
      .line{stroke:#64748B; stroke-width:3; stroke-linecap:round}
      .arrow{fill:#64748B}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="560" rx="24" fill="url(#bg)"/>

  <rect class="node" x="50" y="120" width="270" height="120" rx="16"/>
  <text class="label" x="82" y="170">Modbus Device</text>
  <text class="small" x="82" y="202">PLC / inverter / meter</text>

  <rect x="430" y="95" width="350" height="170" rx="20" fill="url(#bridge)"/>
  <text class="white" x="462" y="145">Modbus MQTT Bridge</text>
  <text class="white" x="462" y="180">- Polls configured points</text>
  <text class="white" x="462" y="210">- Publishes state topics</text>
  <text class="white" x="462" y="240">- Handles /set writes</text>

  <rect class="node" x="880" y="120" width="270" height="120" rx="16"/>
  <text class="label" x="938" y="170">MQTT Broker</text>
  <text class="small" x="938" y="202">Mosquitto / EMQX / HiveMQ</text>

  <rect class="node" x="780" y="360" width="160" height="92" rx="14"/>
  <text class="small" x="806" y="412">Home Assistant</text>

  <rect class="node" x="980" y="360" width="140" height="92" rx="14"/>
  <text class="small" x="1018" y="412">Node-RED</text>

  <rect class="node" x="590" y="360" width="160" height="92" rx="14"/>
  <text class="small" x="625" y="412">CLI / Scripts</text>

  <line class="line" x1="320" y1="180" x2="430" y2="180"/>
  <polygon class="arrow" points="430,180 414,171 414,189"/>
  <text class="small" x="342" y="165">Modbus TCP</text>

  <line class="line" x1="780" y1="180" x2="880" y2="180"/>
  <polygon class="arrow" points="880,180 864,171 864,189"/>
  <text class="small" x="806" y="165">MQTT</text>

  <line class="line" x1="1015" y1="240" x2="1015" y2="360"/>
  <polygon class="arrow" points="1015,360 1006,344 1024,344"/>

  <line class="line" x1="860" y1="240" x2="860" y2="360"/>
  <polygon class="arrow" points="860,360 851,344 869,344"/>

  <line class="line" x1="670" y1="265" x2="670" y2="360"/>
  <polygon class="arrow" points="670,360 661,344 679,344"/>
</svg>
